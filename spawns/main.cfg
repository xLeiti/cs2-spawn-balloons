alias unloadSpawns "exec_async spawns/unloadSpawns.cfg"
alias loadSpawnsMirage "exec_async spawns/maps/de_mirage.cfg"

alias toggleSpawns "toggleSpawnsOn"
alias toggleSpawnsOn "loadSpawnsMirage; alias toggleSpawns toggleSpawnsOff"
alias toggleSpawnsOff "unloadSpawns; alias toggleSpawns toggleSpawnsOn"

bind f3 toggleSpawns;