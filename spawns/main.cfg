//toggle bind to enable/disable the spawn balloons
bind f3 toggleSpawns;

//####################################################################################################
//##===================================⚠️⚠️⚠️ ＬＯＧＩＣ ⚠️⚠️⚠️===================================##
//##⛔⛔⛔ ＤＯ ＮＯＴ ＴＯＵＣＨ ＩＦ ＹＯＵ ＤＯＮ'Ｔ ＫＮＯＷ ＷＨＡＴ ＹＯＵ ＡＲＥ ＤＯＩＮＧ⛔⛔⛔##
//####################################################################################################

alias toggleSpawns "toggleSpawnsOn"
alias toggleSpawnsOn "curMap; alias toggleSpawns toggleSpawnsOff"
alias toggleSpawnsOff "unloadSpawns; alias toggleSpawns toggleSpawnsOn"

alias unloadSpawns "exec_async spawns/unloadSpawns.cfg"
alias curMap "sv_cheats 1; exec_async spawns/offlineCurMap.cfg"

alias loadSpawnsMirage "echo "loading Mirage";  exec spawns/maps/de_mirage.cfg"
alias loadSpawnsInferno "echo "loading Mirage";  exec spawns/maps/de_inferno.cfg"
alias loadSpawnsNuke "echo "loading Nuke";  exec spawns/maps/de_nuke.cfg"
alias loadSpawnsTrain "echo "loading Train";  exec spawns/maps/de_train.cfg"
alias loadSpawnsAncient "echo "loading Ancient";  exec spawns/maps/de_ancient.cfg"
alias loadSpawnsAnubis "echo "loading Anubis";  exec spawns/maps/de_anubis.cfg"
alias loadSpawnsOverpass "echo "loading Overpass";  exec spawns/maps/de_overpass.cfg"
alias loadSpawnsDust2 "echo "loading Overpass";  exec spawns/maps/de_dust2.cfg"
